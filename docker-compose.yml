version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: laboratorium_db
    environment:
      POSTGRES_DB: laboratorium
      POSTGRES_USER: labuser
      POSTGRES_PASSWORD: labpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labuser -d laboratorium"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: laboratorium_api
    environment:
      DATABASE_URL: postgresql://labuser:labpassword@postgres:5432/laboratorium
      JWT_SECRET: change_this_in_production_super_secret_key_123
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
